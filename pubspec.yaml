name: fan_arena
description: "FanArena - Personal sports fan companion"
publish_to: 'none'
version: 1.1.0+4

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.0
  provider: ^6.1.0
  uuid: ^4.5.0
  intl: ^0.19.0
  package_info_plus: ^9.0.0
  battery_plus: ^6.0.0
  http: ^1.6.0
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "newIcon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0B1628"
  adaptive_icon_foreground: "newIcon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
